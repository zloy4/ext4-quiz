<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Файловая система EXT4</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --green: #3fb950;
    --green-bg: #0d2b1a;
    --red: #f85149;
    --red-bg: #2b0d0d;
    --yellow: #d29922;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }
 
  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
 
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
 
  .header-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #1f6feb, #58a6ff);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
 
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
 
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
 
  .progress-area {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    min-width: 200px;
  }
 
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
 
  .progress-bar-wrap {
    width: 200px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
 
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1f6feb, #58a6ff);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }
 
  /* MAIN */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px;
  }
 
  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
 
  .question-card.answered-correct {
    border-color: var(--green);
    background: linear-gradient(135deg, var(--surface), #0d2b1a22);
  }
 
  .question-card.answered-wrong {
    border-color: var(--red);
    background: linear-gradient(135deg, var(--surface), #2b0d0d22);
  }
 
  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 20px;
  }
 
  .question-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: #1f6feb22;
    border: 1px solid #1f6feb44;
    border-radius: 6px;
    padding: 4px 8px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
 
  .question-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    font-weight: 500;
  }
 
  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
 
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }
 
  .option:hover:not(.locked) {
    border-color: var(--accent);
    background: #1f6feb11;
  }
 
  .option.selected-correct {
    border-color: var(--green);
    background: var(--green-bg);
  }
 
  .option.selected-wrong {
    border-color: var(--red);
    background: var(--red-bg);
  }
 
  .option.reveal-correct {
    border-color: var(--green);
    background: var(--green-bg);
  }
 
  .option-letter {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.18s;
  }
 
  .option.selected-correct .option-letter {
    background: var(--green);
    color: white;
  }
 
  .option.selected-wrong .option-letter {
    background: var(--red);
    color: white;
  }
 
  .option.reveal-correct .option-letter {
    background: var(--green);
    color: white;
  }
 
  .option-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
  }
 
  .option.selected-correct .option-text { color: #7ee787; }
  .option.selected-wrong .option-text { color: #ff7b72; }
  .option.reveal-correct .option-text { color: #7ee787; }
 
  .option-icon {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 16px;
  }
 
  /* CODE INLINE */
  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: #79c0ff;
  }
 
  /* SUBMIT BUTTON */
  .submit-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 100;
  }
 
  .submit-info {
    font-size: 13px;
    color: var(--muted);
  }
 
  .submit-info span {
    color: var(--accent);
    font-weight: 600;
  }
 
  .btn-submit {
    background: linear-gradient(135deg, #1f6feb, #58a6ff);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
  }
 
  .btn-submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px #1f6feb55;
  }
 
  .btn-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
 
  /* RESULTS BANNER */
  .results-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 32px;
    text-align: center;
    display: none;
  }
 
  .results-banner.show { display: block; }
 
  .results-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
 
  .results-label {
    font-size: 18px;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 4px;
  }
 
  .results-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
  }
 
  .results-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
 
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
 
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
  }
 
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
 
  .stat-label {
    font-size: 12px;
    color: var(--muted);
  }
 
  .btn-retry {
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
 
  .btn-retry:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
 
  /* unanswered warning */
  .warning-banner {
    display: none;
    background: #2b1f00;
    border: 1px solid var(--yellow);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--yellow);
    text-align: center;
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    z-index: 200;
    animation: slideUp 0.3s ease;
  }
 
  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
 
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .header h1 { font-size: 15px; }
    .header-sub { display: none; }
    .progress-area { min-width: 120px; }
    .progress-bar-wrap { width: 120px; }
    .main { padding: 16px 12px; }
    .question-card { padding: 18px; }
    .results-score { font-size: 48px; }
    .submit-area { padding: 12px 16px; }
  }
</style>
</head>
<body>
 
<div class="header">
  <div class="header-left">
    <div class="header-icon">EX4</div>
    <div>
      <h1>Файловая система EXT4</h1>
      <div class="header-sub" id="quiz-meta">50 вопросов · 4 варианта ответа</div>
    </div>
  </div>
  <div class="progress-area">
    <div class="progress-label">Отвечено: <span id="answered-count">0</span> / <span id="total-count">50</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
</div>
 
<div class="main">
  <div class="results-banner" id="results-banner">
    <div class="results-score" id="score-pct">0%</div>
    <div class="results-label" id="score-label">Результат</div>
    <div class="results-sub" id="score-sub"></div>
    <div class="results-stats">
      <div class="stat-item"><div class="stat-num green" id="correct-count">0</div><div class="stat-label">Правильно</div></div>
      <div class="stat-item"><div class="stat-num red" id="wrong-count">0</div><div class="stat-label">Неправильно</div></div>
    </div>
    <button class="btn-retry" onclick="retryQuiz()">↺ Пройти заново</button>
  </div>
 
  <div id="quiz-container"></div>
</div>
 
<div class="submit-area">
  <div class="submit-info">Не отвечено: <span id="remaining-count">50</span></div>
  <button class="btn-submit" id="submit-btn" onclick="submitQuiz()">Завершить тест</button>
</div>
 
<div class="warning-banner" id="warning-banner">⚠ Ответьте на все вопросы, прежде чем завершить</div>
 
<script>
const questions = [
  {
    q: "Какое магическое число (сигнатура) подтверждает, что файловая система относится к семейству Ext?",
    correct: "0xEF53",
    options: ["0xEF53", "0xF30A", "0x4EF5", "0xAA55"]
  },
  {
    q: "Со какого фиксированного смещения (в байтах) всегда начинается суперблок в Ext4?",
    correct: "0x400 (1024 байт)",
    options: ["0x200 (512 байт)", "0x400 (1024 байт)", "0x800 (2048 байт)", "0x000 (0 байт)"]
  },
  {
    q: "Какой номер inode зарезервирован для корневой директории?",
    correct: "2",
    options: ["0", "1", "2", "11"]
  },
  {
    q: "Какое значение в первых двух байтах поля i_block (0x28) указывает на использование дерева экстентов?",
    correct: "0xF30A",
    options: ["0xEF53", "0xF30A", "0x41ED", "0x0000"]
  },
  {
    q: "Какой флаг типа файла в поле i_mode соответствует обычной директории?",
    correct: "0x4000 (S_IFDIR)",
    options: ["0x8000 (S_IFREG)", "0x4000 (S_IFDIR)", "0xA000 (S_IFLNK)", "0x2000 (S_IFCHR)"]
  },
  {
    q: "В каком поле суперблока хранится метка тома и каков его размер?",
    correct: "s_volume_name, 16 байт",
    options: ["s_volume_name, 16 байт", "s_label, 32 байта", "s_volume_name, 8 байт", "s_mkfs_name, 16 байт"]
  },
  {
    q: "Какой тип файла (file_type) указывается в записи каталога (Directory entry) для обычного файла?",
    correct: "0x1",
    options: ["0x0", "0x1", "0x2", "0x4"]
  },
  {
    q: "Какое поле в дескрипторе группы блоков (GDT) указывает на адрес таблицы индексных дескрипторов?",
    correct: "bg_inode_table_lo",
    options: ["bg_inode_bitmap_lo", "bg_block_bitmap_lo", "bg_inode_table_lo", "bg_free_inodes_count_lo"]
  },
  {
    q: "Какой размер (в байтах) имеет стандартная структура inode в данной лабораторной работе?",
    correct: "256",
    options: ["128", "256", "512", "64"]
  },
  {
    q: "В каком поле суперблока хранится время создания файловой системы и в каком формате?",
    correct: "s_mkfs_time, Unix timestamp",
    options: ["s_mkfs_time, Unix timestamp", "s_wtime, ISO 8601", "s_mtime, Unix timestamp", "s_lastcheck, Unix timestamp"]
  },
  {
    q: "Какое значение в поле s_state суперблока указывает на то, что файловая система была размонтирована корректно?",
    correct: "0x0001",
    options: ["0x0000", "0x0001", "0x0002", "0x0004"]
  },
  {
    q: "Какую структуру необходимо разобрать сразу после смещения 0x28 в inode, если используется дерево экстентов?",
    correct: "ext4_extent_header",
    options: ["ext4_extent", "ext4_extent_idx", "ext4_extent_header", "ext4_group_desc"]
  },
  {
    q: "Какое поле в структуре записи каталога (Directory entry) определяет фактическую длину всей записи (включая имя и выравнивание)?",
    correct: "rec_len",
    options: ["name_len", "rec_len", "inode", "file_type"]
  },
  {
    q: "Какой физический номер блока соответствует началу Таблицы дескрипторов групп (GDT), если размер блока 1024 байта?",
    correct: "2",
    options: ["0", "1", "2", "3"]
  },
  {
    q: "Какой флаг типа файла в Directory entry соответствует символьной ссылке?",
    correct: "0x7",
    options: ["0x5", "0x6", "0x7", "0x3"]
  },
  {
    q: "Какое поле в структуре ext4_extent указывает на номер первого физического блока данных на диске (младшие 32 бита)?",
    correct: "ee_start_lo",
    options: ["ee_block", "ee_len", "ee_start_hi", "ee_start_lo"]
  },
  {
    q: "Какое поле в дескрипторе группы блоков (GDT) указывает на физический адрес битовой карты блоков?",
    correct: "bg_block_bitmap_lo",
    options: ["bg_inode_bitmap_lo", "bg_block_bitmap_lo", "bg_inode_table_lo", "bg_free_blocks_count_lo"]
  },
  {
    q: "Какое поле в структуре ext4_extent_header указывает на максимально возможное количество записей экстентов в данном узле?",
    correct: "eh_max",
    options: ["eh_entries", "eh_max", "eh_depth", "eh_generation"]
  },
  {
    q: "В каком поле структуры inode хранится контрольная сумма для проверки целостности данных дескриптора?",
    correct: "i_checksum_hi",
    options: ["i_mode", "i_blocks_lo", "i_checksum_hi", "i_size_lo"]
  },
  {
    q: "Какое смещение в структуре inode занимает поле i_size_lo, отвечающее за размер файла?",
    correct: "0x04",
    options: ["0x00", "0x04", "0x1C", "0x28"]
  },
  {
    q: "Какое значение в поле file_type записи каталога (Directory entry) соответствует FIFO (именованному каналу)?",
    correct: "0x5",
    options: ["0x3", "0x4", "0x5", "0x6"]
  },
  {
    q: "Какое поле суперблока (смещение 0x3FC) используется для хранения контрольной суммы самого суперблока?",
    correct: "s_checksum",
    options: ["s_magic", "s_state", "s_mkfs_time", "s_checksum"]
  },
  {
    q: "Какое смещение в inode занимает массив i_block[0-14], где хранятся указатели на блоки или дерево экстентов?",
    correct: "0x28",
    options: ["0x04", "0x1C", "0x28", "0x58"]
  },
  {
    q: "Как рассчитать общее количество групп блоков в файловой системе?",
    correct: "s_blocks_count_lo ÷ s_blocks_per_group, округлить вверх",
    options: ["s_inodes_count ÷ s_inodes_per_group", "s_blocks_count_lo ÷ s_blocks_per_group, округлить вверх", "s_blocks_per_group × s_log_block_size", "s_blocks_count_lo × s_log_block_size"]
  },
  {
    q: "Какое поле в дескрипторе группы (GDT) содержит количество свободных inode в данной группе блоков?",
    correct: "bg_free_inodes_count_lo",
    options: ["bg_free_blocks_count_lo", "bg_free_inodes_count_lo", "bg_itable_unused_lo", "bg_used_dirs_count_lo"]
  },
  {
    q: "Какое поле в дескрипторе группы (GDT) показывает количество неиспользуемых inode в конце таблицы для оптимизации сканирования?",
    correct: "bg_itable_unused_lo",
    options: ["bg_free_inodes_count_lo", "bg_used_dirs_count_lo", "bg_itable_unused_lo", "bg_flags"]
  },
  {
    q: "Какое значение смещения (в байтах) в структуре inode соответствует полю i_blocks_lo?",
    correct: "0x1C",
    options: ["0x00", "0x04", "0x1C", "0x28"]
  },
  {
    q: "Каков размер (в байтах) заголовка узла дерева экстентов (ext4_extent_header) и самой записи экстента (ext4_extent)?",
    correct: "12 байт каждая",
    options: ["8 байт каждая", "12 байт каждая", "16 байт каждая", "24 байта каждая"]
  },
  {
    q: "В каком поле дескриптора группы (GDT) содержится счетчик используемых директорий в данной группе?",
    correct: "bg_used_dirs_count_lo",
    options: ["bg_free_inodes_count_lo", "bg_flags", "bg_used_dirs_count_lo", "bg_itable_unused_lo"]
  },
  {
    q: "Какой тип файла (file_type) будет указан в Directory entry для блочного устройства?",
    correct: "0x4",
    options: ["0x2", "0x3", "0x4", "0x5"]
  },
  {
    q: "Какое поле в ext4_extent_header указывает на количество валидных записей экстентов, следующих за этим заголовком?",
    correct: "eh_entries",
    options: ["eh_magic", "eh_entries", "eh_max", "eh_depth"]
  },
  {
    q: "Какой размер (в блоках) всегда занимает суперблок?",
    correct: "1 блок",
    options: ["1 блок", "2 блока", "4 блока", "8 блоков"]
  },
  {
    q: "Какое поле в дескрипторе группы (GDT) указывает на адрес битовой карты inode?",
    correct: "bg_inode_bitmap_lo",
    options: ["bg_block_bitmap_lo", "bg_inode_bitmap_lo", "bg_inode_table_lo", "bg_free_inodes_count_lo"]
  },
  {
    q: "Какова глубина дерева (eh_depth) в заголовке экстента, если он является листовым узлом?",
    correct: "0",
    options: ["0", "1", "2", "4"]
  },
  {
    q: "Какое поле в структуре ext4_extent указывает на количество блоков в данном экстенте?",
    correct: "ee_len",
    options: ["ee_block", "ee_len", "ee_start_lo", "ee_start_hi"]
  },
  {
    q: "Какой флаг в поле bg_flags (GDT) означает, что таблица инодов обнулена?",

// Shuffle options but remember correct index
let quizData = [];
let answered = {};
let submitted = false;
 
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
 
function initQuiz() {
  quizData = questions.map((q, qi) => {
    const shuffled = shuffle(q.options);
    return { ...q, shuffledOptions: shuffled, correctIndex: shuffled.indexOf(q.correct) };
  });
  answered = {};
  submitted = false;
  const total = questions.length;
  document.getElementById('quiz-meta').textContent = `${total} вопросов · 4 варианта ответа`;
  document.getElementById('total-count').textContent = total;
  document.getElementById('remaining-count').textContent = total;
  document.getElementById('score-sub').textContent = '';
  renderQuiz();
  updateProgress();
}
 
const letters = ['A', 'B', 'C', 'D'];
 
function renderQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  quizData.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q-${qi}`;
 
    card.innerHTML = `
      <div class="question-header">
        <span class="question-num">#${String(qi+1).padStart(2,'0')}</span>
        <div class="question-text">${q.q}</div>
      </div>
      <div class="options" id="opts-${qi}">
        ${q.shuffledOptions.map((opt, oi) => `
          <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
            <span class="option-letter">${letters[oi]}</span>
            <span class="option-text">${opt}</span>
            <span class="option-icon"></span>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}
 
function selectOption(qi, oi) {
  if (submitted) return;
  answered[qi] = oi;
 
  // Update UI for this question
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`opt-${qi}-${i}`);
    el.classList.remove('selected-correct', 'selected-wrong');
    el.querySelector('.option-letter').textContent = letters[i];
    el.querySelector('.option-icon').textContent = '';
  }
 
  const sel = document.getElementById(`opt-${qi}-${oi}`);
  sel.classList.add('selected-correct'); // tentative highlight
  sel.querySelector('.option-letter').textContent = '✓';
 
  updateProgress();
}
 
function updateProgress() {
  const total = questions.length;
  const count = Object.keys(answered).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('remaining-count').textContent = total - count;
  document.getElementById('progress-fill').style.width = (count / total * 100) + '%';
}
 
function submitQuiz() {
  const total = questions.length;
  const count = Object.keys(answered).length;
  if (count < total) {
    const warn = document.getElementById('warning-banner');
    warn.style.display = 'block';
    warn.style.animation = 'none';
    warn.offsetHeight;
    warn.style.animation = 'slideUp 0.3s ease';
    setTimeout(() => { warn.style.display = 'none'; }, 3000);
    return;
  }
 
  submitted = true;
  let correct = 0;
  let wrong = 0;
 
  quizData.forEach((q, qi) => {
    const card = document.getElementById(`q-${qi}`);
    const chosen = answered[qi];
    const isCorrect = chosen === q.correctIndex;
 
    if (isCorrect) {
      correct++;
      card.classList.add('answered-correct');
    } else {
      wrong++;
      card.classList.add('answered-wrong');
    }
 
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`opt-${qi}-${i}`);
      el.classList.remove('selected-correct', 'selected-wrong', 'reveal-correct');
      el.querySelector('.option-icon').textContent = '';
      el.querySelector('.option-letter').textContent = letters[i];
    }
 
    // Mark correct
    const correctEl = document.getElementById(`opt-${qi}-${q.correctIndex}`);
    correctEl.classList.add('reveal-correct');
    correctEl.querySelector('.option-icon').textContent = '✓';
 
    // Mark wrong if chosen differently
    if (!isCorrect) {
      const chosenEl = document.getElementById(`opt-${qi}-${chosen}`);
      chosenEl.classList.add('selected-wrong');
      chosenEl.querySelector('.option-icon').textContent = '✗';
    }
 
    // Lock all options
    document.querySelectorAll(`#opts-${qi} .option`).forEach(o => o.classList.add('locked'));
  });
 
  const pct = Math.round(correct / total * 100);
  document.getElementById('score-pct').textContent = pct + '%';
  const label = pct >= 90 ? '🏆 Отлично!' : pct >= 70 ? '👍 Хорошо' : pct >= 50 ? '📚 Нужно повторить' : '❌ Изучите материал';
  document.getElementById('score-label').textContent = label;
  document.getElementById('score-sub').textContent = `Правильных ответов: ${correct} из ${total}`;
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('wrong-count').textContent = wrong;
  document.getElementById('results-banner').classList.add('show');
  document.getElementById('results-banner').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('submit-btn').disabled = true;
}
 
function retryQuiz() {
  document.getElementById('results-banner').classList.remove('show');
  document.getElementById('submit-btn').disabled = false;
  initQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
 
initQuiz();
</script>
